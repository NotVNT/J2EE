    spring.application.name=moneymanager

    spring.config.import=optional:file:.env[.properties],optional:file:Backend/moneymanager/.env[.properties]

    spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_JDBC_URL:${DATABASE_URL:jdbc:mysql://${DATABASE_HOST}:${DATABASE_PORT:3306}/${DATABASE_NAME}?sslMode=REQUIRED}}}
    spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DATABASE_USER:}}}
    spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    server.port=${SERVER_PORT:8080}

    server.servlet.context-path=/api/v1.0

    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true

    spring.mail.host=smtp-relay.brevo.com
    spring.mail.port=587

    spring.mail.username=${BREVO_USERNAME}
    spring.mail.password=${BREVO_PASSWORD}
    spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true

    # JWT
    jwt.secret=${JWT_SECRET}

    money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:3000}

    app.activation.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:3000}
    # Reset password link should point to frontend route
    app.reset-password.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:3000}

    # PayOS
    payos.client-id=${PAYOS_CLIENT_ID}
    payos.api-key=${PAYOS_API_KEY}
    payos.checksum-key=${PAYOS_CHECKSUM_KEY}
    payos.return-url=${PAYOS_RETURN_URL}
    payos.cancel-url=${PAYOS_CANCEL_URL}
    payos.mobile-return-url=${PAYOS_MOBILE_RETURN_URL:moneymanager://payment/success}
    payos.mobile-cancel-url=${PAYOS_MOBILE_CANCEL_URL:moneymanager://payment/cancel}
    payos.webhook-url=${PAYOS_WEBHOOK_URL}
    payos.status-sync-delay-ms=${PAYOS_STATUS_SYNC_DELAY_MS:30000}

    gemini.api-key=${GEMINI_API_KEY}
    gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
    gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:30}

