    spring.application.name=moneymanager

    spring.config.import=optional:file:.env[.properties],optional:file:Backend/moneymanager/.env[.properties]

    spring.datasource.url=${SPRING_DATASOURCE_URL}
    spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
    spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    server.port=${SERVER_PORT:8080}

    server.servlet.context-path=/api/v1.0

    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

    spring.mail.host=smtp-relay.brevo.com
    spring.mail.port=587

    spring.mail.username=${BREVO_USERNAME}
    spring.mail.password=${BREVO_PASSWORD}
    spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true

    # JWT
    jwt.secret=${JWT_SECRET}

    money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}

    app.activation.url=${MONEY_MANAGER_FRONTEND_URL}
    # Thï¿½m dï¿½ng nï¿½y cho reset password
    app.reset-password.url=${MONEY_MANAGER_BACKEND_URL}

    # PayOS
    payos.client-id=${PAYOS_CLIENT_ID}
    payos.api-key=${PAYOS_API_KEY}
    payos.checksum-key=${PAYOS_CHECKSUM_KEY}
    payos.return-url=${PAYOS_RETURN_URL}
    payos.cancel-url=${PAYOS_CANCEL_URL}
    payos.webhook-url=${PAYOS_WEBHOOK_URL}
    payos.status-sync-delay-ms=${PAYOS_STATUS_SYNC_DELAY_MS:30000}
